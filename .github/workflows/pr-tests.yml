name: PR Tests

on:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore packages
        run: nuget restore src/DZMAC.sln

      - name: Build solution (Release)
        run: msbuild src/DZMAC.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Run unit tests
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }

          $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath

          if (-not $installPath) {
            throw "Visual Studio installation not found via vswhere"
          }

          $vstest = Join-Path $installPath 'Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe'

          if (-not (Test-Path $vstest)) {
            throw "vstest.console.exe not found at $vstest"
          }

          & $vstest 'src\DZMAC.Tests\bin\Release\DZMAC.Tests.dll' /Logger:trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
