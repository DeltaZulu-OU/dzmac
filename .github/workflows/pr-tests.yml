name: PR Tests

on:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore packages
        run: nuget restore src/DZMAC.sln

      - name: Build solution (Release)
        run: msbuild src/DZMAC.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Run unit tests
        run: dotnet test src/DZMAC.Tests/DZMAC.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
