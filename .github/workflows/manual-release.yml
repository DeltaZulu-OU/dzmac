name: Manual Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Restore packages
        run: nuget restore src/DZMAC.sln

      - name: Read version from csproj
        id: version
        shell: pwsh
        run: |
          $projectPath = 'src/DZMAC/DZMAC.csproj'
          [xml]$projectXml = Get-Content $projectPath -Raw

          $version = $projectXml.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Unable to read <Version> from $projectPath"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate release tag is new
        shell: pwsh
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $existingTag = git ls-remote --tags --refs origin "refs/tags/$tag"

          if (-not [string]::IsNullOrWhiteSpace($existingTag)) {
            throw "Tag '$tag' already exists. Bump <Version> in src/DZMAC/DZMAC.csproj before releasing."
          }

      - name: Build
        run: msbuild src/DZMAC.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Prepare release artifacts
        id: artifacts
        shell: pwsh
        run: |
          $buildOutputDir = 'src/DZMAC/bin/Release/net481'
          $expectedDzmacExe = Join-Path $buildOutputDir 'DZMAC.exe'
          $dzmacExe = Join-Path $buildOutputDir 'DZMAC.exe'

          if (Test-Path $expectedDzmacExe) {
            $releaseExe = $expectedDzmacExe
          }
          elseif (Test-Path $dzmacExe) {
            $releaseExe = $expectedDzmacExe
            Copy-Item $dzmacExe $releaseExe -Force
          }
          else {
            throw 'Neither DZMAC.exe nor DZMAC.exe was found in release output.'
          }

          $sha256 = (Get-FileHash -Path $releaseExe -Algorithm SHA256).Hash.ToLowerInvariant()
          $shaPath = "$releaseExe.sha256"
          "${sha256} *DZMAC.exe" | Set-Content -Path $shaPath -NoNewline

          "exe_path=$releaseExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha_path=$shaPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: DZMAC v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.artifacts.outputs.exe_path }}
            ${{ steps.artifacts.outputs.sha_path }}
